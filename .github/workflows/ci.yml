name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  install:
    name: Installation des dépendances
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Restaurer le cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Installer les dépendances
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

  format-lint:
    name: Formatage & Lint
    runs-on: ubuntu-latest
    needs: [install]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restaurer le cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Vérifier le formatage (Prettier)
        run: npm run format:check

      - name: Analyser le code (ESLint + SonarJS)
        run: npm run lint

  tests:
    name: Tests unitaires
    runs-on: ubuntu-latest
    needs: [format-lint]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restaurer le cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Lancer les tests avec couverture
        run: npm run test:ci

  tests-e2e:
    name: Tests E2E (Supertest)
    runs-on: ubuntu-latest
    needs: [tests]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restaurer le cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Lancer les tests E2E
        run: npm run test:e2e
        env:
          DATABASE_URL: ':memory:'

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [tests-e2e]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restaurer le cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Compiler l'application
        run: npm run build

      - name: Sauvegarder le build
        uses: actions/upload-artifact@v4
        with:
          name: build-dist
          path: dist/

  security:
    name: Scan de sécurité (Trivy)
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Installer Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b .

      - name: Scanner les dépendances npm
        run: ./trivy fs --exit-code 0 --severity CRITICAL,HIGH --no-progress .

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [security]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restaurer le cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Configurer git user
        run: |
          git config user.email "ci@example.com"
          git config user.name "CI"

      - name: Calculer la version
        run: npx commit-and-tag-version

      - name: Push commit et tag
        run: git push --follow-tags origin HEAD:main

  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    needs: [release]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restaurer le cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Telecharger le build
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: dist/

      - name: Configurer Verdaccio
        run: npm set //localhost:4873/:_authToken "dummy-token"

      - name: Publier le package
        run: npm publish --registry http://localhost:4873

  publish-docker:
    name: Publish Docker
    runs-on: ubuntu-latest
    needs: [release]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Telecharger le build
        uses: actions/download-artifact@v4
        with:
          name: build-dist
          path: dist/

      - name: Calculer le tag Docker
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verifier que le tag Docker n'existe pas
        run: |
          TAG="${{ steps.version.outputs.version }}"
          URL="http://localhost:5000/v2/tp-cd-deployment/manifests/${TAG}"
          if curl -fsI \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            "$URL" > /dev/null; then
            echo "Le tag Docker ${TAG} existe deja dans le registry local."
            echo "Publier deux fois le meme tag masquerait l'image precedente."
            exit 1
          fi

      - name: Construire l'image
        run: docker build -t localhost:5000/tp-cd-deployment:${{ steps.version.outputs.version }} .

      - name: Publier l'image
        run: docker push localhost:5000/tp-cd-deployment:${{ steps.version.outputs.version }}

  # ---------------------------------------------------------------------------
  # EXERCICE 1 : Ajouter les jobs "deploy-npm", "deploy-docker" et
  # "healthcheck-deployment" ici.
  # - deploy-npm depend de publish-npm et installe le package via SSH sur
  #   ssh-npm-target avec pm2.
  # - deploy-docker depend de publish-docker et lance l'image publiee via SSH
  #   sur ssh-docker-target.
  # - healthcheck-deployment depend des deux deploiements et verifie
  #   http://localhost:3001/health puis http://localhost:3002/health.
  # ---------------------------------------------------------------------------
  deploy-npm:
    name: Deploy npm
    runs-on: ubuntu-latest
    needs: [publish-npm] # Attend la publication npm.
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Calculer la version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Deployer le package npm
        uses: appleboy/ssh-action@v1.0.3 # Exécute le script sur la cible SSH.
        with:
          host: localhost
          port: 2222 # Relais vers ssh-npm-target.
          username: deployer
          key: ${{ secrets.SSH_PRIVATE_KEY }} # Clé préparée dans .secrets pour act.
          script: |
            set -e
            mkdir -p ~/app
            CURRENT=$(node -p "require('/home/deployer/app/node_modules/tp-cd-deployment/package.json').version" 2>/dev/null || echo "")
            echo "$CURRENT" > ~/app/.previous-npm-version # Prépare un rollback.
            npm install --prefix ~/app tp-cd-deployment@${{ steps.version.outputs.version }} --registry http://verdaccio:4873 --ignore-scripts
            pm2 delete tp-cd-deployment-npm 2>/dev/null || true
            PORT=3000 DATABASE_URL=/home/deployer/app/dev.db pm2 start ~/app/node_modules/tp-cd-deployment/dist/src/main.js --name tp-cd-deployment-npm --update-env

  deploy-docker:
    name: Deploy Docker
    runs-on: ubuntu-latest
    needs: [publish-docker] # Attend que l'image existe dans le registry.
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Calculer la version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Deployer l'image Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: localhost
          port: 2223 # Relais vers ssh-docker-target.
          username: deployer
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            docker pull localhost:5000/tp-cd-deployment:${{ steps.version.outputs.version }}
            docker rm -f tp-cd-deployment-app 2>/dev/null || true
            docker run -d \
              --name tp-cd-deployment-app \
              --network container:tp-cd-deployment-ssh-docker-target \
              -e PORT=3000 \
              -e DATABASE_URL=/app/dev.db \
              localhost:5000/tp-cd-deployment:${{ steps.version.outputs.version }}
  # ---------------------------------------------------------------------------
  # EXERCICE 3 : Ajouter un rollback automatique simple ici.
  # L'objectif est de revenir a la derniere version connue si le healthcheck
  # final echoue. Les consignes detaillees sont dans EXERCICE.md.
  # ---------------------------------------------------------------------------

  healthcheck-deployment:
    name: Healthcheck deployment
    runs-on: ubuntu-latest
    needs: [deploy-npm, deploy-docker] # Attend les deux chemins de déploiement.
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Verifier le service npm
        run: curl -f http://localhost:3001/health # -f échoue sur HTTP 4xx/5xx.
      - name: Verifier le service Docker
        run: curl -f http://localhost:3002/health